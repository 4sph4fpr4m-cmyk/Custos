  <!-- Cross held at center -->
  <line x1="256" y1="275" x2="256" y2="325" stroke="#d4a843" stroke-width="4.5" opacity="0.7" stroke-linecap="round"/>
  <line x1="242" y1="290" x2="270" y2="290" stroke="#d4a843" stroke-width="4.5" opacity="0.7" stroke-linecap="round"/>
  
